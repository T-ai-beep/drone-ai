<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>

// ─── D-Pad ──────────────────────────────────────────────────────
const DPad = ({ onPress }) => {
  const btn = (dir, label, icon) => (
    <button
      onClick={()=>onPress(dir)}
      style={{
        background:'rgba(255,255,255,0.05)',
        border:'1px solid rgba(255,255,255,0.08)',
        borderRadius: dir==='center' ? '50%' : 8,
        color:dir==='center'?'var(--text2)':'var(--text)',
        cursor:'pointer',
        display:'flex',alignItems:'center',justifyContent:'center',
        fontSize: dir==='center'?9:12,
        fontFamily:'DM Sans',
        fontWeight:500,
        transition:'all 0.12s',

      }}

      {btn('left','','chevleft')}{btn('center','Menu')}{btn('right','','chevright')}
      <div/>{btn('down','','chevdown')}<div/>
    </div>

};

// ─── Compass ────────────────────────────────────────────────────
const Compass = ({ heading }) => {
  const cardinals = [
    {label:'N',deg:0},{label:'NE',deg:45},{label:'E',deg:90},{label:'SE',deg:135},
    {label:'S',deg:180},{label:'SW',deg:225},{label:'W',deg:270},{label:'NW',deg:315},
  ];
  const ticks = Array.from({length:72},(_,i)=>i*5);
  const r = 88;
  return (
    <div style={{position:'relative',width:'100%',height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:8}}>
      {/* degree badge */}
      <div style={{
        background:'var(--blue)',
        color:'#fff',
        fontSize:12,
        fontWeight:600,
        padding:'3px 12px',
        borderRadius:20,
        letterSpacing:'0.08em',
        ...mono,
        zIndex:2,
      }}>
        {Math.round(heading)}°
      </div>

      {/* compass ring */}
      <div style={{position:'relative',width:200,height:200,flexShrink:0}}>
        {/* outer ring */}
        <svg viewBox="-110 -110 220 220" style={{width:'100%',height:'100%',position:'absolute',inset:0}}>
          <defs>
            <radialGradient id="compassbg" cx="50%" cy="50%">
              <stop offset="0%" stopColor="#2A2720"/>
              <stop offset="100%" stopColor="#161410"/>
            </radialGradient>
          </defs>
          <circle r="105" fill="#111008" stroke="rgba(200,169,110,0.15)" strokeWidth="1.5"/>
          <circle r="98" fill="url(#compassbg)" stroke="rgba(200,169,110,0.08)" strokeWidth="0.5"/>
          
          {/* tick marks */}
          <g style={{transform:`rotate(${-heading}deg)`,transformOrigin:'center',transition:'transform 0.3s ease'}}>
            {ticks.map(deg=>{
              const rad = deg*(Math.PI/180);
              const major = deg%90===0, minor = deg%45===0;
              const inner = major?76:minor?80:84;
              const x1=Math.sin(rad)*inner, y1=-Math.cos(rad)*inner;
              const x2=Math.sin(rad)*r, y2=-Math.cos(rad)*r;
              return <line key={deg} x1={x1} y1={y1} x2={x2} y2={y2}
                stroke={major?'var(--gold)':minor?'rgba(200,169,110,0.5)':'rgba(255,255,255,0.15)'}
                strokeWidth={major?1.5:minor?1:0.5}/>;
            })}
            {/* cardinal labels */}
            {cardinals.map(({label,deg})=>{
              const rad=deg*(Math.PI/180);
              const dist=66;
              return <text key={label} x={Math.sin(rad)*dist} y={-Math.cos(rad)*dist+4}
                textAnchor="middle" fontSize={label.length===1?11:8}
                fontWeight={label.length===1?700:400}
                fill={label==='N'?'var(--gold)':'rgba(240,237,232,0.8)'}
                fontFamily="DM Sans">{label}</text>;
            })}
            {/* crosshair lines */}
            <line x1="0" y1="-88" x2="0" y2="88" stroke="rgba(255,255,255,0.04)" strokeWidth="0.5"/>
            <line x1="-88" y1="0" x2="88" y2="0" stroke="rgba(255,255,255,0.04)" strokeWidth="0.5"/>
          </g>

          {/* fixed north pointer */}
          <polygon points="0,-78 5,-50 0,-40 -5,-50" fill="var(--gold)" opacity="0.9"/>
          <polygon points="0,-40 5,-50 0,-78 -5,-50" fill="rgba(200,169,110,0.3)"/>
          {/* center dot */}
          <circle r="5" fill="var(--gold)"/>
          <circle r="2" fill="#0F0E0D"/>
        </svg>
      </div>

      {/* GPS coords */}
      <div style={{textAlign:'center',lineHeight:1.4}}>
        <div style={{fontSize:10,...mono,color:'var(--text2)',letterSpacing:'0.05em'}}>
          56.7438° N, 78.23521° E
        </div>
      </div>
    </div>
  );
};

// ─── Main App ───────────────────────────────────────────────────
function App() {
  const [activeNav, setActiveNav] = useState('compass');
  const [recording, setRecording] = useState(true);
  const [paused, setPaused] = useState(false);
  const [recTime, setRecTime] = useState(129); // seconds
  const [mediaTab, setMediaTab] = useState('video');
  const [battery, setBattery] = useState(75);
  const [altitude, setAltitude] = useState(80);
  const [speed, setSpeed] = useState(20);
  const [heading, setHeading] = useState(83);
  const [flightSec, setFlightSec] = useState(343);
  const [iso, setIso] = useState(600);
  const [aperture] = useState(2.85);
  const [sliderVal, setSliderVal] = useState(8.3);
  const [activeMode, setActiveMode] = useState('hdr');
  const [frameLines] = useState(['1920:1080','1280:720','854:480','640:360']);
  const [activeLine, setActiveLine] = useState('1280:720');
  const [fps, setFps] = useState(19.67);
  const [locked] = useState(true);
  const [dpadMsg, setDpadMsg] = useState('');

  // Live telemetry simulation (fallback when WebSocket not connected)
  const [wsConnected, setWsConnected] = useState(false);
  const [observation, setObservation] = useState('Awaiting AI analysis...');
  const [threat, setThreat] = useState('none');
  const [agentAction, setAgentAction] = useState('hover');
  const [liveFrame, setLiveFrame] = useState(null);

  useEffect(()=>{
    const interval = setInterval(()=>{
      if(!paused && !wsConnected) {
        setRecTime(t=>t+1);
        setFlightSec(t=>t+1);
        setHeading(h=>(h + 0.08 + (Math.random()-0.5)*0.1 + 360)%360);
        setSpeed(s=>Math.max(15,Math.min(28, s+(Math.random()-0.5)*1.2)));
        setAltitude(a=>Math.max(70,Math.min(95, a+(Math.random()-0.5)*0.8)));
        setFps(f=>Math.max(18.5,Math.min(21, f+(Math.random()-0.5)*0.3)));
        setIso(i=>Math.max(560,Math.min(650, i+(Math.random()-0.5)*8)));
      }
    }, 1000);
    return ()=>clearInterval(interval);
  },[paused, wsConnected]);

  // WebSocket connection to ARIA server
  useEffect(()=>{
    const connect = () => {
      try {
        const ws = new WebSocket('ws://localhost:3001');

        ws.onopen = () => {
          setWsConnected(true);
          console.log('ARIA: Connected to server');
        };

        ws.onmessage = (event) => {
          try {
            const data = JSON.parse(event.data);
            if (data.type !== 'update') return;

            // Update live camera frame
            if (data.frame) {
              setLiveFrame('data:image/jpeg;base64,' + data.frame);
            }

            // Update telemetry from MAVLink
            if (data.telemetry) {
              const t = data.telemetry;
              if (t.altitude !== undefined) setAltitude(parseFloat(t.altitude) || 0);
              if (t.heading !== undefined) setHeading(parseFloat(t.heading) || 0);
              if (t.battery !== undefined) setBattery(parseInt(t.battery) || 75);
              if (t.speed !== undefined) setSpeed(parseFloat(t.speed) || 0);
              setFlightSec(s => s + 1);
              setRecTime(t2 => t2 + 1);
            }

            // Update AI agent analysis
            if (data.analysis) {
              setObservation(data.analysis.observation || '');
              setThreat(data.analysis.threat || 'none');
              setAgentAction((data.analysis.action || 'hover') + ' ' + (data.analysis.direction !== 'none' ? data.analysis.direction : ''));
            }
          } catch(e) { console.warn('ARIA parse error:', e); }
        };

        ws.onclose = () => {
          setWsConnected(false);
          console.log('ARIA: Disconnected. Reconnecting in 3s...');
          setTimeout(connect, 3000);
        };

        ws.onerror = () => ws.close();

        return ws;
      } catch(e) {
        console.log('ARIA: WebSocket unavailable, using simulation');
      }
    };

    const ws = connect();
    return () => ws && ws.close();
  }, []);

  const handleDpad = (dir) => {
    const msgs = {up:'↑ Pitch Forward',down:'↓ Pitch Back',left:'← Yaw Left',right:'→ Yaw Right',center:'Menu'};
    setDpadMsg(msgs[dir]||'');
    setTimeout(()=>setDpadMsg(''),1200);
  };

  const navItems = ['home','compass','gallery','user','settings','bell','waypoints'];

  const cardStyle = {
    background:'var(--card)',
    borderRadius: 'var(--r)',
    border:'1px solid rgba(255,255,255,0.04)',
    overflow:'hidden',
  };

  // format time
  const fmtTime = (s) => `${pad(Math.floor(s/60))}:${pad(s%60)}`;

  return (
    <div style={{
      width:'100vw', height:'100vh',
      background:'#0A0908',
      display:'flex',
      alignItems:'center',
      justifyContent:'center',
      padding:16,
    }}>
      {/* ── Main shell ── */}
      <div style={{
        width:'100%', maxWidth:1380,
        height:'100%', maxHeight:860,
        display:'grid',
        gridTemplateColumns:'58px 1fr 260px',
        gridTemplateRows:'1fr',
        gap:10,
      }}>

        {/* ── LEFT SIDEBAR ── */}
        <div style={{
          ...cardStyle,
          display:'flex', flexDirection:'column',
          alignItems:'center',
          padding:'16px 0',
          gap:6,
        }}>
          {/* Logo */}
          <div style={{
            width:36, height:36, borderRadius:10,
            background:'linear-gradient(135deg,#C8A96E,#8B6030)',
            display:'flex', alignItems:'center', justifyContent:'center',
            fontSize:11, fontWeight:700, letterSpacing:'0.05em', color:'#0F0E0D',
            marginBottom:10, flexShrink:0,
          }}>AR</div>

          {navItems.map(n=>(
            <button key={n} onClick={()=>setActiveNav(n)} style={{
              width:40, height:40, borderRadius:10, border:'none',
              background: activeNav===n ? 'rgba(200,169,110,0.15)' : 'transparent',
              color: activeNav===n ? 'var(--gold)' : 'var(--text3)',
              cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center',
              transition:'all 0.15s',
              outline: activeNav===n ? '1px solid rgba(200,169,110,0.25)' : 'none',
            }}>
              <Icon name={n} size={17} color={activeNav===n?'var(--gold)':'var(--text3)'}/>
            </button>
          ))}

          <div style={{flex:1}}/>
          <div style={{width:32,height:1,background:'var(--border)',marginBottom:4}}/>

          {/* Avatar */}
          <div style={{
            width:32, height:32, borderRadius:'50%',
            background:'linear-gradient(135deg,#6B8A9E,#3A5A6E)',
            display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:11, fontWeight:600, color:'#fff', marginBottom:6,
          }}>TS</div>

          <button style={{width:40,height:40,borderRadius:10,border:'none',background:'transparent',color:'var(--text3)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Icon name="power" size={17} color="var(--text3)"/>
          </button>
        </div>

        {/* ── CENTER COLUMN ── */}
        <div style={{display:'grid',gridTemplateRows:'1fr auto',gap:10,minHeight:0}}>

          {/* ── CAMERA FEED ── */}
          <div style={{...cardStyle,position:'relative',overflow:'hidden',minHeight:0}}>
            {/* Live camera frame overlay - shown when WebSocket connected */}
            {liveFrame && (
              <img src={liveFrame} style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',zIndex:1,opacity:0.9}} alt="live"/>
            )}
            {/* Fallback simulated feed */}
            <DesertFeed recording={recording} paused={paused}/>

            {/* HUD overlays */}
            <div style={{position:'absolute',inset:0,pointerEvents:'none',zIndex:2}}>
              {/* WebSocket status + AI observation bar at bottom */}
              <div style={{
                position:'absolute',bottom:0,left:0,right:0,
                background:'linear-gradient(transparent,rgba(0,0,0,0.7))',
                padding:'20px 16px 12px',
                display:'flex',justifyContent:'space-between',alignItems:'flex-end',
              }}>
                <div style={{maxWidth:'60%'}}>
                  {observation && (
                    <div style={{fontSize:10,color:'rgba(240,237,232,0.8)',fontFamily:"'DM Mono',monospace",lineHeight:1.4}}>
                      <span style={{
                        color: threat==='high'?'#E05555':threat==='medium'?'#E08020':threat==='low'?'#C8A96E':'#6DB86D',
                        marginRight:8,fontSize:9,letterSpacing:'0.1em'
                      }}>
                        ● {threat.toUpperCase()}
                      </span>
                      {observation}
                    </div>
                  )}
                </div>
                <div style={{
                  fontSize:9,fontFamily:"'DM Mono',monospace",
                  color: wsConnected ? '#6DB86D' : 'rgba(255,255,255,0.3)',
                  letterSpacing:'0.1em',
                  display:'flex',alignItems:'center',gap:6,
                }}>
                  <div style={{
                    width:6,height:6,borderRadius:'50%',
                    background: wsConnected ? '#6DB86D' : '#444',
                    boxShadow: wsConnected ? '0 0 8px #6DB86D' : 'none',
                  }}/>
                  {wsConnected ? 'ARIA LIVE' : 'SIM MODE'}
                </div>
              </div>
              {/* top-left HUD */}
              <div style={{position:'absolute',top:12,left:12,display:'flex',flexDirection:'column',gap:8}}>
                {/* HDR badge */}
                <div style={{
                  background:'rgba(20,18,14,0.85)', border:'1px solid rgba(200,169,110,0.3)',
                  borderRadius:6, padding:'3px 10px',
                  fontSize:11, fontWeight:700, letterSpacing:'0.15em',color:'var(--text)',
                  backdropFilter:'blur(4px)',display:'inline-flex',alignSelf:'flex-start',
                }}>HDR</div>
                {/* res + fps */}
                <div style={{fontSize:11,...mono,color:'var(--gold)',fontWeight:500,letterSpacing:'0.05em'}}>
                  4K · {fmt(fps,2)}FPS
                </div>
                {/* Level */}
                <div style={{marginTop:2}}>
                  <div style={{fontSize:9,...mono,color:'var(--text3)',letterSpacing:'0.1em',marginBottom:3}}>LEVEL</div>
                  <div style={{
                    background:'rgba(20,18,14,0.8)',border:'1px solid rgba(255,255,255,0.08)',
                    borderRadius:4,padding:'2px 8px',fontSize:10,...mono,color:'var(--text)',
                  }}>KT</div>
                </div>
                {/* Color channels */}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4,marginTop:2}}>
                  {[['R','#E05555'],['G','#55C855'],['B','#5599E0'],['Y','#E0C855']].map(([c,col])=>(
                    <div key={c} style={{
                      background:'rgba(0,0,0,0.6)',border:'1px solid rgba(255,255,255,0.08)',
                      borderRadius:5,padding:'3px 8px',display:'flex',alignItems:'center',gap:4,
                    }}>
                      <div style={{width:6,height:6,borderRadius:'50%',background:col,boxShadow:`0 0 4px ${col}`}}/>
                      <span style={{fontSize:10,fontWeight:600,color:'var(--text)'}}>{c}</span>
                    </div>
                  ))}
                </div>
                {/* Aperture + histogram */}
                <div style={{display:'flex',flexDirection:'column',gap:4,marginTop:2}}>
                  <div style={{
                    background:'rgba(0,0,0,0.65)',border:'1px solid rgba(255,255,255,0.08)',
                    borderRadius:6,padding:'4px 8px',fontSize:11,...mono,fontWeight:600,color:'var(--text)',
                    display:'inline-flex',alignSelf:'flex-start',
                  }}>H{aperture}</div>
                  <Histogram/>
                </div>
              </div>

              {/* top-right controls */}
              <div style={{position:'absolute',top:12,right:12,display:'flex',gap:8,pointerEvents:'all'}}>
                <button onClick={()=>setPaused(p=>!p)} style={{
                  background:'rgba(20,18,14,0.85)',border:'1px solid rgba(255,255,255,0.1)',
                  borderRadius:8,width:36,height:36,cursor:'pointer',
                  display:'flex',alignItems:'center',justifyContent:'center',
                  color:'var(--text)',backdropFilter:'blur(4px)',
                }}>
                  <Icon name={paused?'play':'pause'} size={14} color="var(--text)"/>
                </button>
                <div style={{
                  background:'rgba(20,18,14,0.85)',border:'1px solid rgba(200,80,80,0.3)',
                  borderRadius:8,padding:'0 12px',height:36,
                  display:'flex',alignItems:'center',gap:7,
                  backdropFilter:'blur(4px)',
                  pointerEvents:'none',
                }}>
                  <div style={{
                    width:7,height:7,borderRadius:'50%',background:'var(--red)',
                    boxShadow:'0 0 6px var(--red)',
                    animation: recording&&!paused ? 'pulse-dot 1s ease infinite' : 'none',
                  }}/>
                  <span style={{fontSize:12,...mono,fontWeight:600,color:'var(--text)'}}>
                    {fmtTime(recTime)}
                  </span>
                </div>
              </div>

              {/* Target lock box */}
              <div style={{
                position:'absolute',
                top:'42%',left:'52%',
                transform:'translate(-50%,-50%)',
                animation: 'float-target 6s ease-in-out infinite',
              }}>
                <div style={{
                  width:64,height:64,
                  border:'1.5px solid var(--gold)',
                  borderRadius:3,
                  position:'relative',
                  boxShadow:'0 0 12px rgba(200,169,110,0.3)',
                }}>
                  {/* corners */}
                  {[{top:-1,left:-1},{top:-1,right:-1},{bottom:-1,left:-1},{bottom:-1,right:-1}].map((pos,i)=>(
                    <div key={i} style={{
                      position:'absolute',width:8,height:8,
                      borderTop: (i<2)?'2px solid var(--gold)':'none',
                      borderBottom: (i>=2)?'2px solid var(--gold)':'none',
                      borderLeft: (i%2===0)?'2px solid var(--gold)':'none',
                      borderRight: (i%2===1)?'2px solid var(--gold)':'none',
                      ...pos,
                    }}/>
                  ))}
                  {/* crosshair */}
                  <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',
                    width:8,height:8,borderRadius:'50%',border:'1.5px solid var(--gold)',
                  }}/>
                  {/* sun/target icon */}
                  <div style={{position:'absolute',bottom:-20,left:'50%',transform:'translateX(-50%)',
                    fontSize:9,...mono,color:'var(--gold)',whiteSpace:'nowrap',opacity:0.8,
                  }}>LOCK</div>
                </div>
              </div>

              {/* flight path line */}
              <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none'}}>
                <path d="M 200,55% Q 38%,45% 52%,42%" stroke="rgba(255,255,255,0.35)" strokeWidth="1.5" fill="none" strokeDasharray="4,3"/>
                <circle cx="38%" cy="45%" r="4" fill="none" stroke="rgba(255,255,255,0.5)" strokeWidth="1.5"/>
              </svg>
            </div>
          </div>

          {/* ── FLIGHT CONTROLS ── */}
          <div style={{...cardStyle,padding:'12px 14px',display:'grid',gridTemplateColumns:'160px 1fr auto',gap:14}}>

            {/* Left: tabs + mini map */}
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {/* tabs */}
              <div style={{display:'flex',gap:6}}>
                {['video','photo'].map(t=>(
                  <button key={t} onClick={()=>setMediaTab(t)} style={{
                    flex:1,padding:'5px 0',borderRadius:8,border:'none',cursor:'pointer',
                    background: mediaTab===t ? 'rgba(200,169,110,0.15)' : 'transparent',
                    color: mediaTab===t ? 'var(--gold)' : 'var(--text3)',
                    fontSize:11,fontWeight:600,letterSpacing:'0.06em',
                    textTransform:'capitalize',
                    outline: mediaTab===t ? '1px solid rgba(200,169,110,0.2)' : 'none',
                    transition:'all 0.15s',
                    display:'flex',alignItems:'center',justifyContent:'center',gap:4,
                  }}>
                    <Icon name={t==='video'?'camera':'gallery'} size={11} color={mediaTab===t?'var(--gold)':'var(--text3)'}/>
                    {t.charAt(0).toUpperCase()+t.slice(1)}
                  </button>
                ))}
              </div>
              {/* channel bars */}
              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                {[1,2].map(ch=>(
                  <div key={ch} style={{display:'flex',alignItems:'center',gap:4}}>
                    <span style={{fontSize:9,...mono,color:'var(--text3)',fontWeight:700}}>{ch}</span>
                    <div style={{display:'flex',gap:1}}>
                      {Array.from({length:8},(_,i)=>(
                        <div key={i} style={{width:3,height:10+Math.random()*4,background:`rgba(200,169,110,${0.2+i*0.08})`,borderRadius:1}}/>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
              {/* mini map */}
              <div style={{flex:1,minHeight:80}}>
                <MiniMap/>
              </div>
            </div>

            {/* Center: telemetry grid */}
            <div style={{display:'flex',flexDirection:'column',gap:10,justifyContent:'center'}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'8px 16px'}}>
                {[
                  {label:'SPEED',value:`${Math.round(speed)} km/h`},
                  {label:'LENS',value:'25 mm'},
                  {label:'FRAME LINE',value:activeLine,big:true},
                  {label:'HEIGHT',value:`${Math.round(altitude)} m`},
                  {label:'ISO',value:Math.round(iso)},
                  {label:'',value:''},
                  {label:'FLIGHT TIME',value:fmtTime(flightSec)},
                  {label:'SHUTTER',value:'180.0'},
                  {label:'',value:''},
                ].map((item,i)=>(
                  <div key={i} style={{minHeight:36}}>
                    {item.label && <>
                      <div style={{fontSize:9,...mono,color:'var(--text3)',letterSpacing:'0.1em',marginBottom:2}}>{item.label}</div>
                      <div style={{
                        fontSize: item.big?13:14,
                        fontWeight: item.big?700:600,
                        color: item.big?'var(--gold)':'var(--text)',
                        ...mono,
                        animation:'data-flicker 5s ease infinite',
                      }}>{item.value}</div>
                    </>}
                  </div>
                ))}
              </div>
              {/* frame line selector */}
              <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                {frameLines.map(fl=>(
                  <button key={fl} onClick={()=>setActiveLine(fl)} style={{
                    padding:'3px 8px',borderRadius:5,border:'1px solid rgba(255,255,255,0.06)',
                    background: activeLine===fl ? 'rgba(200,169,110,0.12)' : 'transparent',
                    color: activeLine===fl ? 'var(--gold)' : 'var(--text3)',
                    fontSize:9,...mono,cursor:'pointer',transition:'all 0.1s',
                    outline: activeLine===fl ? '1px solid rgba(200,169,110,0.2)' : 'none',
                  }}>{fl}</button>
                ))}
              </div>
            </div>

            {/* Right: AWB/DISP + D-pad */}
            <div style={{display:'flex',flexDirection:'column',gap:10,alignItems:'center',justifyContent:'center'}}>
              {/* AWB / DISP */}
              <div style={{display:'flex',gap:6}}>
                {['AWB','DISP'].map(b=>(
                  <button key={b} style={{
                    padding:'5px 10px',borderRadius:8,
                    border:'1px solid rgba(255,255,255,0.08)',
                    background:'rgba(255,255,255,0.04)',
                    color:'var(--text)',fontSize:10,fontWeight:600,
                    letterSpacing:'0.08em',cursor:'pointer',transition:'all 0.12s',
                  }}
                  onMouseDown={e=>e.currentTarget.style.background='rgba(200,169,110,0.1)'}
                  onMouseUp={e=>e.currentTarget.style.background='rgba(255,255,255,0.04)'}
                  onMouseLeave={e=>e.currentTarget.style.background='rgba(255,255,255,0.04)'}
                  >{b}</button>
                ))}
              </div>
              {/* D-pad */}
              <DPad onPress={handleDpad}/>
              {dpadMsg && <div style={{fontSize:9,...mono,color:'var(--gold)',letterSpacing:'0.08em',height:14}}>{dpadMsg}</div>}
              {!dpadMsg && <div style={{height:14}}/>}
            </div>
          </div>
        </div>

        {/* ── RIGHT COLUMN ── */}
        <div style={{display:'grid',gridTemplateRows:'1fr 1fr',gap:10}}>

          {/* ── VEHICLE INFO ── */}
          <div style={{...cardStyle,padding:18,display:'flex',flexDirection:'column',gap:14}}>
            {/* header */}
            <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
              <div>
                <div style={{fontSize:16,fontWeight:700,letterSpacing:'0.03em',marginBottom:2}}>ARIA DRONE</div>
                <div style={{fontSize:10,color:'var(--text2)',letterSpacing:'0.05em'}}>FHD High-Framerate Live Feed</div>
              </div>
              <div style={{
                width:40,height:40,borderRadius:10,
                background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.06)',
                display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,
              }}>
                <Icon name="drone" size={20} color="var(--text2)"/>
              </div>
            </div>

            <div style={{width:'100%',height:1,background:'rgba(255,255,255,0.05)'}}/>

            {/* battery */}
            <div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                <div>
                  <div style={{fontSize:11,fontWeight:600,marginBottom:1}}>Battery status</div>
                  <div style={{fontSize:9,color:'var(--text3)'}}>12min ago</div>
                </div>
                <div style={{fontSize:18,fontWeight:700,color:'var(--gold-bright)',...mono}}>{battery}%</div>
              </div>
              <div style={{height:4,background:'rgba(255,255,255,0.08)',borderRadius:2,overflow:'hidden'}}>
                <div style={{
                  width:`${battery}%`,height:'100%',
                  background:`linear-gradient(90deg, var(--gold), var(--gold-bright))`,
                  borderRadius:2,transition:'width 0.5s ease',
                }}/>
              </div>
            </div>

            {/* altitude */}
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{fontSize:11,fontWeight:600}}>Altitude limited</div>
              <div style={{fontSize:18,fontWeight:700,...mono}}>{Math.round(altitude * 3.28)} <span style={{fontSize:12,color:'var(--text2)',fontWeight:400}}>ft</span></div>
            </div>

            {/* slider */}
            <div>
              <div style={{height:4,background:'rgba(255,255,255,0.08)',borderRadius:2,position:'relative',cursor:'pointer'}}
                onClick={e=>{
                  const rect=e.currentTarget.getBoundingClientRect();
                  const pct=(e.clientX-rect.left)/rect.width;
                  setSliderVal(+(pct*10).toFixed(1));
                }}>
                <div style={{width:`${sliderVal*10}%`,height:'100%',background:'linear-gradient(90deg,rgba(200,169,110,0.3),var(--gold))',borderRadius:2}}/>
                <div style={{
                  position:'absolute',top:'50%',left:`${sliderVal*10}%`,
                  transform:'translate(-50%,-50%)',
                  width:14,height:14,borderRadius:'50%',
                  background:'var(--card3)',border:'2px solid var(--gold)',
                  boxShadow:'0 0 8px rgba(200,169,110,0.4)',
                }}/>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',marginTop:6}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <div style={{width:8,height:8,borderRadius:'50%',background:'rgba(255,255,255,0.2)',border:'1.5px solid rgba(255,255,255,0.3)'}}/>
                  <span style={{fontSize:9,color:'var(--text3)',...mono}}>•O</span>
                </div>
                <span style={{fontSize:11,fontWeight:700,...mono,color:'var(--text)'}}>{sliderVal.toFixed(1)}</span>
              </div>
            </div>

            <div style={{width:'100%',height:1,background:'rgba(255,255,255,0.05)'}}/>

            {/* mode toggles */}
            <div style={{display:'flex',gap:8,justifyContent:'center'}}>
              {[
                {id:'hdr',icon:'hdr',label:'HDR+'},
                {id:'night',icon:'moon',label:'Night'},
                {id:'auto',icon:'settings',label:'Auto'},
              ].map(m=>(
                <button key={m.id} onClick={()=>setActiveMode(m.id)} style={{
                  flex:1,padding:'8px 0',borderRadius:10,border:'none',cursor:'pointer',
                  background: activeMode===m.id ? 'rgba(200,169,110,0.15)' : 'rgba(255,255,255,0.04)',
                  outline: activeMode===m.id ? '1px solid rgba(200,169,110,0.3)' : '1px solid rgba(255,255,255,0.04)',
                  display:'flex',flexDirection:'column',alignItems:'center',gap:4,
                  transition:'all 0.15s',
                }}>
                  <Icon name={m.id==='hdr'?'hdr':m.id==='night'?'moon':'settings'} size={16}
                    color={activeMode===m.id?'var(--gold)':'var(--text3)'}/>
                  <span style={{fontSize:8,fontWeight:600,letterSpacing:'0.08em',
                    color:activeMode===m.id?'var(--gold)':'var(--text3)',
                  }}>{m.label}</span>
                </button>
              ))}
            </div>
          </div>

          {/* ── COMPASS ── */}
          <div style={{...cardStyle,padding:16,display:'flex',flexDirection:'column',gap:0}}>
            <Compass heading={heading}/>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
