<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEACON — Incident Command</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #07090C;
    --card: #0C0F15;
    --card2: #111520;
    --border: rgba(255,255,255,0.05);
    --border2: rgba(255,255,255,0.1);
    --gold: #C8A96E;
    --gold2: #E8C878;
    --text: #E2E8F0;
    --text2: #7A8799;
    --text3: #374151;
    --green: #22C55E;
    --red: #EF4444;
    --amber: #F59E0B;
    --r: 10px;
  }
  html, body, #root { width:100%; height:100%; background:var(--bg); overflow:hidden; color:var(--text); font-family:'Syne',sans-serif; }
  ::-webkit-scrollbar { width:2px; }
  ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:1px; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
  @keyframes scan { 0%{top:-2px} 100%{top:100%} }
  @keyframes glow { 0%,100%{opacity:0.8} 50%{opacity:1} }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const mono = { fontFamily:"'DM Mono',monospace" };
const pad = (n,l=2) => String(Math.floor(n)).padStart(l,'0');

const cardH = {background:'var(--card)',borderRadius:'var(--r)',border:'1px solid var(--border)',overflow:'hidden',display:'flex',flexDirection:'column'};
const hdr = (title,right) => (
  <div style={{padding:'7px 12px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
    <span style={{fontSize:7,fontWeight:600,letterSpacing:'0.2em',color:'var(--text3)',...mono,textTransform:'uppercase'}}>{title}</span>
    {right&&<span style={{fontSize:7,...mono,color:'var(--gold)',letterSpacing:'0.06em'}}>{right}</span>}
  </div>
);

function CameraFeed({heading,battery,altitude}) {
  const [mode,setMode] = useState('THERMAL');
  return (
    <div style={{position:'relative',width:'100%',height:'100%',background:'#040506',overflow:'hidden'}}>
      <svg viewBox="0 0 800 460" style={{width:'100%',height:'100%',position:'absolute',inset:0}}>
        <defs>
          <radialGradient id="h1" cx="52%" cy="42%"><stop offset="0%" stopColor={mode==='THERMAL'?"#FF5500":"#8B6A3A"} stopOpacity="0.85"/><stop offset="100%" stopColor="transparent"/></radialGradient>
          <radialGradient id="h2" cx="30%" cy="65%"><stop offset="0%" stopColor={mode==='THERMAL'?"#FF3300":"#6B4E2A"} stopOpacity="0.6"/><stop offset="100%" stopColor="transparent"/></radialGradient>
          <radialGradient id="vig" cx="50%" cy="50%"><stop offset="50%" stopColor="transparent"/><stop offset="100%" stopColor="rgba(4,5,6,0.75)"/></radialGradient>
        </defs>
        <rect width="800" height="460" fill={mode==='THERMAL'?"#08020A":"#4A3820"}/>
        {mode!=='THERMAL'&&<>
          <polygon points="0,180 70,115 155,150 240,88 330,132 415,78 495,125 575,92 655,140 735,98 800,118 800,210 0,210" fill="#3D2D18" opacity="0.9"/>
          <polygon points="0,230 55,190 135,208 195,178 275,202 350,168 430,198 505,174 585,200 650,178 730,205 800,185 800,260 0,260" fill="#5A3D22" opacity="0.9"/>
        </>}
        <rect width="800" height="460" fill="url(#h1)"/>
        <rect width="800" height="460" fill="url(#h2)"/>
        <g stroke="rgba(200,169,110,0.05)" strokeWidth="0.5">
          {[1,2,3,4,5,6,7].map(i=><line key={i} x1={i*100} y1="0" x2={i*100} y2="460"/>)}
          {[1,2,3,4].map(i=><line key={i} x1="0" y1={i*92} x2="800" y2={i*92}/>)}
        </g>
        <rect x="0" y="0" width="800" height="1.5" fill="rgba(200,169,110,0.1)" style={{animation:'scan 4s linear infinite'}}/>
        <rect x="382" y="162" width="56" height="56" fill="none" stroke="#EF4444" strokeWidth="1.2" rx="2"/>
        <line x1="382" y1="162" x2="374" y2="154" stroke="#EF4444" strokeWidth="1"/>
        <line x1="438" y1="162" x2="446" y2="154" stroke="#EF4444" strokeWidth="1"/>
        <line x1="382" y1="218" x2="374" y2="226" stroke="#EF4444" strokeWidth="1"/>
        <line x1="438" y1="218" x2="446" y2="226" stroke="#EF4444" strokeWidth="1"/>
        <circle cx="410" cy="190" r="2.5" fill="none" stroke="#EF4444" strokeWidth="1"/>
        <text x="410" y="238" textAnchor="middle" fontSize="7" fill="#EF4444" fontFamily="'DM Mono',monospace" letterSpacing="2" style={{animation:'glow 2s ease-in-out infinite'}}>SURVIVOR</text>
        <rect width="800" height="460" fill="url(#vig)"/>
      </svg>

      {/* Mode pills */}
      <div style={{position:'absolute',top:8,left:'50%',transform:'translateX(-50%)',display:'flex',gap:4,zIndex:10}}>
        {['THERMAL','RGB','PIP'].map(m=>(
          <button key={m} onClick={()=>setMode(m)} style={{padding:'2px 9px',borderRadius:20,border:mode===m?'1px solid rgba(200,169,110,0.5)':'1px solid rgba(255,255,255,0.08)',background:mode===m?'rgba(200,169,110,0.18)':'rgba(7,9,12,0.75)',color:mode===m?'var(--gold)':'var(--text3)',fontSize:7,fontWeight:600,letterSpacing:'0.12em',cursor:'pointer',...mono,backdropFilter:'blur(6px)'}}>{m}</button>
        ))}
      </div>

      {/* TL coords */}
      <div style={{position:'absolute',top:8,left:8,background:'rgba(7,9,12,0.82)',border:'1px solid var(--border2)',borderRadius:7,padding:'5px 9px',backdropFilter:'blur(6px)'}}>
        <div style={{fontSize:6,color:'var(--text3)',...mono,letterSpacing:'0.12em',marginBottom:2}}>COORDS</div>
        <div style={{fontSize:10,color:'var(--text)',...mono,fontWeight:500,lineHeight:1.5}}>33.1584° N<br/>96.6735° W</div>
      </div>

      {/* TR compass */}
      <div style={{position:'absolute',top:8,right:8,background:'rgba(7,9,12,0.82)',border:'1px solid var(--border2)',borderRadius:7,padding:'5px 9px',backdropFilter:'blur(6px)',display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
        <div style={{fontSize:6,color:'var(--text3)',...mono,letterSpacing:'0.12em'}}>HDG</div>
        <svg width="36" height="36" viewBox="-20 -20 40 40">
          <circle r="18" fill="none" stroke="rgba(200,169,110,0.12)" strokeWidth="1"/>
          <g style={{transform:`rotate(${heading}deg)`,transformOrigin:'center',transition:'transform 0.4s ease'}}>
            <polygon points="0,-13 2.5,-4 0,0 -2.5,-4" fill="var(--gold)"/>
            <polygon points="0,13 2.5,4 0,0 -2.5,4" fill="var(--text3)"/>
          </g>
          <circle r="2" fill="var(--gold)"/>
        </svg>
        <div style={{fontSize:10,color:'var(--gold)',...mono,fontWeight:700}}>{Math.round(heading)}°</div>
      </div>

      {/* BL battery */}
      <div style={{position:'absolute',bottom:8,left:8,background:'rgba(7,9,12,0.82)',border:'1px solid var(--border2)',borderRadius:7,padding:'5px 9px',backdropFilter:'blur(6px)',minWidth:110}}>
        <div style={{fontSize:6,color:'var(--text3)',...mono,letterSpacing:'0.12em',marginBottom:3}}>BATTERY · ALT</div>
        <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:2}}>
          <div style={{flex:1,height:2.5,background:'rgba(255,255,255,0.07)',borderRadius:1,overflow:'hidden'}}>
            <div style={{width:`${battery}%`,height:'100%',background:battery>50?'var(--green)':battery>25?'var(--amber)':'var(--red)',borderRadius:1,transition:'width 1s'}}/>
          </div>
          <span style={{fontSize:10,...mono,fontWeight:700,color:battery>50?'var(--green)':battery>25?'var(--amber)':'var(--red)'}}>{battery}%</span>
        </div>
        <div style={{fontSize:7,color:'var(--text2)',...mono}}>{Math.round(altitude*3.28)}ft · ~{Math.round(battery*0.3)}min</div>
      </div>

      {/* BR map */}
      <div style={{position:'absolute',bottom:8,right:8,width:130,height:90,background:'rgba(7,9,12,0.9)',border:'1px solid var(--border2)',borderRadius:7,overflow:'hidden',backdropFilter:'blur(6px)'}}>
        <svg viewBox="0 0 130 90" style={{width:'100%',height:'100%'}}>
          <rect width="130" height="90" fill="#0A0D14"/>
          {[12,24,36,48,60,72].map((y,i)=>(
            <path key={i} d={`M0,${y} Q${32+i*5},${y-5} ${65+i*3},${y} Q${98},${y+4} 130,${y-2}`} stroke="rgba(100,80,50,0.3)" strokeWidth="0.7" fill="none"/>
          ))}
          <path d="M8,45 Q38,42 65,47 Q92,52 122,44" stroke="rgba(200,160,80,0.35)" strokeWidth="1.2" fill="none"/>
          <circle cx="78" cy="35" r="10" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.4)" strokeWidth="0.7"/>
          <circle cx="50" cy="58" r="7" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.4)" strokeWidth="0.7"/>
          <circle cx="65" cy="47" r="2.5" fill="var(--gold)"/>
          <circle cx="65" cy="47" r="5" fill="none" stroke="var(--gold)" strokeWidth="0.7" opacity="0.5"/>
          <text x="65" y="82" textAnchor="middle" fontSize="5.5" fill="var(--text3)" fontFamily="'DM Mono',monospace">ALLEN TX</text>
        </svg>
      </div>

      {/* AI obs */}
      <div style={{position:'absolute',bottom:8,left:'50%',transform:'translateX(-50%)',background:'rgba(7,9,12,0.85)',border:'1px solid var(--border2)',borderRadius:7,padding:'4px 12px',backdropFilter:'blur(6px)',whiteSpace:'nowrap'}}>
        <span style={{fontSize:7,color:'var(--red)',...mono,marginRight:6,letterSpacing:'0.1em'}}>● HIGH</span>
        <span style={{fontSize:8,color:'var(--text2)',...mono}}>38.2°C · bearing 047° · 23m · human 91%</span>
      </div>
    </div>
  );
}

function CompassWidget({heading}) {
  const ticks = Array.from({length:36},(_,i)=>i*10);
  const cardinals = [{l:'N',d:0},{l:'E',d:90},{l:'S',d:180},{l:'W',d:270}];
  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:5,padding:'8px',height:'100%'}}>
      <div style={{fontSize:10,...mono,color:'var(--gold)',fontWeight:700,background:'rgba(200,169,110,0.1)',padding:'2px 10px',borderRadius:20,border:'1px solid rgba(200,169,110,0.2)'}}>{Math.round(heading)}°</div>
      <svg width="95" height="95" viewBox="-52 -52 104 104">
        <circle r="50" fill="#090B10" stroke="rgba(200,169,110,0.1)" strokeWidth="1"/>
        <g style={{transform:`rotate(${-heading}deg)`,transformOrigin:'center',transition:'transform 0.4s ease'}}>
          {ticks.map(deg=>{
            const rad=deg*Math.PI/180,major=deg%90===0;
            const r1=major?36:40;
            return <line key={deg} x1={Math.sin(rad)*r1} y1={-Math.cos(rad)*r1} x2={Math.sin(rad)*46} y2={-Math.cos(rad)*46} stroke={major?'var(--gold)':'rgba(255,255,255,0.1)'} strokeWidth={major?1.2:0.5}/>;
          })}
          {cardinals.map(({l,d})=>{
            const rad=d*Math.PI/180;
            return <text key={l} x={Math.sin(rad)*26} y={-Math.cos(rad)*26+4} textAnchor="middle" fontSize={l==='N'?10:7} fontWeight={l==='N'?700:400} fill={l==='N'?'var(--gold)':'rgba(226,232,240,0.6)'} fontFamily="Syne">{l}</text>;
          })}
        </g>
        <polygon points="0,-40 2.5,-24 0,-16 -2.5,-24" fill="var(--gold)" opacity="0.9"/>
        <circle r="3" fill="var(--gold)"/>
        <circle r="1.2" fill="#07090C"/>
      </svg>
      <div style={{fontSize:6,...mono,color:'var(--text3)',textAlign:'center',lineHeight:1.5}}>33.1584° N · 96.6735° W</div>
    </div>
  );
}

function App() {
  const alerts = {
    red:{color:'#C0392B',desc:'CONFIRMED THREAT — SURVIVOR DETECTED — IMMEDIATE ACTION REQUIRED'},
    purple:{color:'#6B2FA0',desc:'CRITICAL — MULTIPLE SYSTEMS FLAGGING — DEPLOY NOW'},
    blue:{color:'#1A6B9A',desc:'ELEVATED RISK — MODELS FLAGGING — PREPARE TO DEPLOY'},
    green:{color:'#1A7A4A',desc:'MONITORING ACTIVE — NO IMMEDIATE THREAT — STANDBY'},
    grey:{color:'#2D3748',desc:'SYSTEM IDLE — NO SCENARIO ACTIVE'},
  };

  const [alertLevel,setAlertLevel] = useState('RED');
  const [alertColor,setAlertColor] = useState('#C0392B');
  const [alertDesc,setAlertDesc] = useState(alerts.red.desc);
  const [battery,setBattery] = useState(75);
  const [altitude,setAltitude] = useState(80);
  const [heading,setHeading] = useState(83);
  const [flightSec,setFlightSec] = useState(343);
  const [clock,setClock] = useState('');
  const [decisions,setDecisions] = useState([]);
  const [commInput,setCommInput] = useState('');
  const [commLog,setCommLog] = useState([
    {time:'06:51',sender:'BEACON',msg:'Thermal detection bearing 047°. Recommend deploy.'},
    {time:'06:48',sender:'CMD',msg:'All teams hold. Awaiting consensus.'},
    {time:'06:40',sender:'BEACON',msg:'USGS M4.2 detected 180km NE. Aftershock 34%.'},
  ]);
  const [activeNav,setActiveNav] = useState('compass');

  useEffect(()=>{
    const iv=setInterval(()=>{
      setFlightSec(t=>t+1);
      setHeading(h=>(h+0.08+(Math.random()-0.5)*0.1+360)%360);
      setAltitude(a=>Math.max(70,Math.min(95,a+(Math.random()-0.5)*0.8)));
      setClock(new Date().toTimeString().split(' ')[0]);
    },1000);
    return ()=>clearInterval(iv);
  },[]);

  const fmtTime=s=>`${pad(Math.floor(s/60))}:${pad(s%60)}`;
  const execute=()=>setDecisions(d=>[{time:clock,rec:'Deploy Drone-1 to Sector 4',out:'EXECUTED'},...d]);
  const reject=()=>setDecisions(d=>[{time:clock,rec:'Deploy Drone-1 to Sector 4',out:'REJECTED'},...d]);
  const sendComm=()=>{if(!commInput.trim())return;setCommLog(l=>[{time:clock,sender:'CMD',msg:commInput},...l]);setCommInput('');};

  const navPaths = {
    home:<path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z" stroke="currentColor" strokeWidth="1.5" fill="none" strokeLinejoin="round"/>,
    compass:<><circle cx="12" cy="12" r="9" stroke="currentColor" strokeWidth="1.5" fill="none"/><path d="M16.24 7.76l-2.12 6.36-6.36 2.12 2.12-6.36 6.36-2.12z" fill="currentColor"/></>,
    gallery:<><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" strokeWidth="1.5" fill="none"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><path d="M21 15l-5-5L5 21" stroke="currentColor" strokeWidth="1.5" fill="none"/></>,
    user:<><circle cx="12" cy="8" r="4" stroke="currentColor" strokeWidth="1.5" fill="none"/><path d="M4 20c0-4 3.58-7 8-7s8 3 8 7" stroke="currentColor" strokeWidth="1.5" fill="none" strokeLinecap="round"/></>,
    settings:<><circle cx="12" cy="12" r="3" stroke="currentColor" strokeWidth="1.5" fill="none"/><path d="M12 2v2m0 16v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M2 12h2m16 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></>,
    bell:<><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9" stroke="currentColor" strokeWidth="1.5" fill="none" strokeLinejoin="round"/><path d="M13.73 21a2 2 0 01-3.46 0" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></>,
    waypoints:<><circle cx="12" cy="5" r="2" stroke="currentColor" strokeWidth="1.5" fill="none"/><circle cx="5" cy="19" r="2" stroke="currentColor" strokeWidth="1.5" fill="none"/><circle cx="19" cy="19" r="2" stroke="currentColor" strokeWidth="1.5" fill="none"/><path d="M12 7v4m-5.27 6.5L10 13m9.27 6.5L14 13" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></>,
    power:<><path d="M12 3v9" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/><path d="M18.36 5.64a9 9 0 11-12.72 0" stroke="currentColor" strokeWidth="1.5" fill="none" strokeLinecap="round"/></>,
  };
  const Icon=({name,size=15,color='currentColor'})=>(<svg width={size} height={size} viewBox="0 0 24 24" style={{color,flexShrink:0}}>{navPaths[name]}</svg>);

  const intelItems=[
    {src:'NOAA',time:'06:54',lvl:'high',msg:'Wind shift 15mph NW by 07:30. Fire models updating.'},
    {src:'USGS',time:'06:51',lvl:'medium',msg:'M3.1 aftershock. Within Reasenberg-Jones window.'},
    {src:'AP',time:'06:48',lvl:'low',msg:'Media reporting closures on Route 121. Unconfirmed.'},
    {src:'NWS',time:'06:45',lvl:'high',msg:'Flash flood watch Allen TX through 10PM.'},
    {src:'FIRMS',time:'06:40',lvl:'high',msg:'NASA VIIRS new hotspot 2.3km NE of perimeter.'},
  ];
  const lvlColor=l=>l==='high'?'var(--red)':l==='medium'?'var(--amber)':'var(--text3)';

  return (
    <div style={{width:'100vw',height:'100vh',background:'var(--bg)',display:'flex',flexDirection:'column',gap:6,padding:6}}>

      {/* STATUS BANNER */}
      <div style={{height:46,borderRadius:10,background:alertColor,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 18px',flexShrink:0,boxShadow:`0 0 28px ${alertColor}55`,transition:'background 0.5s ease'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:7,height:7,borderRadius:'50%',background:'#fff',animation:'pulse 1.5s ease infinite'}}/>
          <span style={{fontSize:13,fontWeight:800,letterSpacing:'0.2em',color:'#fff',fontFamily:'Syne'}}>{alertLevel}</span>
          <span style={{fontSize:8,color:'rgba(255,255,255,0.6)',...mono,letterSpacing:'0.04em'}}>{alertDesc}</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:5}}>
          {Object.entries(alerts).map(([k,v])=>(
            <button key={k} onClick={()=>{setAlertLevel(k.toUpperCase());setAlertColor(v.color);setAlertDesc(v.desc);}} style={{padding:'3px 9px',borderRadius:20,cursor:'pointer',fontFamily:'DM Mono',fontSize:7,fontWeight:700,letterSpacing:'0.12em',textTransform:'uppercase',border:alertLevel===k.toUpperCase()?'1px solid rgba(255,255,255,0.55)':'1px solid rgba(255,255,255,0.12)',background:alertLevel===k.toUpperCase()?'rgba(255,255,255,0.2)':'transparent',color:'#fff',transition:'all 0.15s'}}>{k}</button>
          ))}
          <div style={{width:1,height:18,background:'rgba(255,255,255,0.2)',margin:'0 4px'}}/>
          <span style={{fontSize:10,...mono,color:'rgba(255,255,255,0.8)',letterSpacing:'0.04em'}}>{clock}</span>
          <span style={{fontSize:8,...mono,color:'rgba(255,255,255,0.4)',marginLeft:3}}>{fmtTime(flightSec)}</span>
        </div>
      </div>

      {/* MAIN GRID — matches wireframe exactly */}
      <div style={{flex:1,display:'grid',gridTemplateColumns:'44px 230px 1fr 210px',gridTemplateRows:'1fr 185px',gap:6,minHeight:0}}>

        {/* SIDEBAR — spans both rows */}
        <div style={{...cardH,gridRow:'1/3',padding:'10px 0',gap:3,alignItems:'center'}}>
          <div style={{width:30,height:30,borderRadius:7,background:'linear-gradient(135deg,var(--gold),#7A5020)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,color:'#07090C',marginBottom:6,fontFamily:'Syne',flexShrink:0}}>B</div>
          {['home','compass','gallery','user','settings','bell','waypoints'].map(n=>(
            <button key={n} onClick={()=>setActiveNav(n)} style={{width:32,height:32,borderRadius:7,border:'none',background:activeNav===n?'rgba(200,169,110,0.14)':'transparent',color:activeNav===n?'var(--gold)':'var(--text3)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.15s',outline:activeNav===n?'1px solid rgba(200,169,110,0.2)':'none'}}>
              <Icon name={n} size={14} color={activeNav===n?'var(--gold)':'var(--text3)'}/>
            </button>
          ))}
          <div style={{flex:1}}/>
          <div style={{width:20,height:1,background:'var(--border)',marginBottom:3}}/>
          <div style={{width:26,height:26,borderRadius:'50%',background:'linear-gradient(135deg,#6B8A9E,#3A5A6E)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,fontWeight:700,color:'#fff',marginBottom:3}}>TS</div>
          <button style={{width:32,height:32,borderRadius:7,border:'none',background:'transparent',color:'var(--text3)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Icon name="power" size={13} color="var(--text3)"/>
          </button>
        </div>

        {/* COL 2 — AI Advisor + Comms stacked */}
        <div style={{gridColumn:'2',gridRow:'1',display:'flex',flexDirection:'column',gap:6,minHeight:0}}>

          {/* AI ADVISOR */}
          <div style={{...cardH,flexShrink:0}}>
            {hdr('AI ADVISOR','94% CONF')}
            <div style={{padding:'10px 12px',display:'flex',flexDirection:'column',gap:8}}>
              <div style={{fontSize:12,fontWeight:700,color:'var(--text)',lineHeight:1.45}}>
                Deploy Drone-1 to Sector 4 North — thermal candidate at bearing 047°
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:5}}>
                {[{m:'TRIGRS',t:'2 critical slopes · bearing 047° · 340m'},{m:'THERMAL',t:'38.2°C signature · 91% human probability'},{m:'MATTSON',t:'78% probability Zone 1 · forest terrain'}].map((r,i)=>(
                  <div key={i} style={{display:'flex',gap:7,alignItems:'flex-start'}}>
                    <span style={{fontSize:7,fontWeight:700,color:'var(--gold)',...mono,letterSpacing:'0.08em',flexShrink:0,minWidth:50,marginTop:1}}>{r.m}</span>
                    <span style={{fontSize:8,color:'var(--text2)',...mono,lineHeight:1.4}}>{r.t}</span>
                  </div>
                ))}
              </div>
              <div style={{display:'flex',alignItems:'center',gap:7}}>
                <span style={{fontSize:6,color:'var(--text3)',...mono,letterSpacing:'0.12em',flexShrink:0}}>CONFIDENCE</span>
                <div style={{flex:1,height:2,background:'rgba(255,255,255,0.06)',borderRadius:1,overflow:'hidden'}}>
                  <div style={{width:'94%',height:'100%',background:'linear-gradient(90deg,var(--gold),var(--gold2))',borderRadius:1}}/>
                </div>
                <span style={{fontSize:11,fontWeight:700,color:'var(--gold)',...mono}}>94%</span>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5}}>
                <button onClick={execute} style={{padding:'8px 0',borderRadius:7,border:'1px solid rgba(34,197,94,0.3)',background:'rgba(34,197,94,0.09)',color:'var(--green)',fontSize:9,fontWeight:700,letterSpacing:'0.1em',cursor:'pointer',fontFamily:'Syne',transition:'all 0.15s'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(34,197,94,0.18)'} onMouseLeave={e=>e.currentTarget.style.background='rgba(34,197,94,0.09)'}>▶ EXECUTE</button>
                <button onClick={reject} style={{padding:'8px 0',borderRadius:7,border:'1px solid rgba(239,68,68,0.3)',background:'rgba(239,68,68,0.09)',color:'var(--red)',fontSize:9,fontWeight:700,letterSpacing:'0.1em',cursor:'pointer',fontFamily:'Syne',transition:'all 0.15s'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(239,68,68,0.18)'} onMouseLeave={e=>e.currentTarget.style.background='rgba(239,68,68,0.09)'}>✕ REJECT</button>
              </div>
              {decisions[0]&&<div style={{fontSize:7,...mono,color:'var(--text3)',borderTop:'1px solid var(--border)',paddingTop:5}}>LAST · {decisions[0].time} · <span style={{color:decisions[0].out==='EXECUTED'?'var(--green)':'var(--red)'}}>{decisions[0].out}</span></div>}
            </div>
          </div>

          {/* COMMS */}
          <div style={{...cardH,flex:1,minHeight:0}}>
            {hdr('COMMS','LIVE')}
            <div style={{flex:1,overflow:'auto',padding:'7px 10px',display:'flex',flexDirection:'column',gap:5}}>
              {commLog.map((m,i)=>(
                <div key={i} style={{display:'flex',gap:5,alignItems:'flex-start'}}>
                  <span style={{fontSize:6,color:'var(--text3)',...mono,flexShrink:0,marginTop:2}}>{m.time}</span>
                  <span style={{fontSize:7,fontWeight:700,color:m.sender==='BEACON'?'var(--gold)':'var(--text2)',...mono,flexShrink:0}}>{m.sender}</span>
                  <span style={{fontSize:7,color:'var(--text2)',...mono,lineHeight:1.4}}>{m.msg}</span>
                </div>
              ))}
            </div>
            <div style={{padding:'6px 10px',borderTop:'1px solid var(--border)',display:'flex',gap:5,flexShrink:0}}>
              <input value={commInput} onChange={e=>setCommInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendComm()} placeholder="Send command..." style={{flex:1,background:'var(--card2)',border:'1px solid var(--border2)',borderRadius:5,padding:'4px 7px',color:'var(--text)',fontSize:8,...mono,outline:'none'}}/>
              <button onClick={sendComm} style={{padding:'4px 8px',borderRadius:5,background:'rgba(200,169,110,0.12)',border:'1px solid rgba(200,169,110,0.25)',color:'var(--gold)',fontSize:7,fontWeight:700,cursor:'pointer',...mono,letterSpacing:'0.06em'}}>SEND</button>
            </div>
          </div>
        </div>

        {/* COL 3 — CAMERA spans row 1 */}
        <div style={{...cardH,gridColumn:'3',gridRow:'1',minHeight:0}}>
          <CameraFeed heading={heading} battery={battery} altitude={altitude}/>
        </div>

        {/* COL 4 — Logs + Compass */}
        <div style={{gridColumn:'4',gridRow:'1',display:'flex',flexDirection:'column',gap:6,minHeight:0}}>
          <div style={{...cardH,flex:1,minHeight:0}}>
            {hdr('MISSION LOG')}
            <div style={{flex:1,overflow:'auto',padding:'7px 10px',display:'flex',flexDirection:'column',gap:4}}>
              {decisions.map((d,i)=>(
                <div key={i} style={{display:'flex',gap:5,padding:'4px 7px',background:'var(--card2)',borderRadius:5,border:'1px solid var(--border)'}}>
                  <span style={{fontSize:6,color:'var(--text3)',...mono,flexShrink:0,marginTop:1}}>{d.time}</span>
                  <span style={{fontSize:7,color:'var(--text2)',...mono,flex:1,lineHeight:1.4}}>{d.rec}</span>
                  <span style={{fontSize:6,fontWeight:700,color:d.out==='EXECUTED'?'var(--green)':'var(--red)',...mono,flexShrink:0}}>{d.out}</span>
                </div>
              ))}
              {[{time:'06:51',msg:'USGS M3.1 aftershock logged',c:'var(--amber)'},{time:'06:48',msg:'Drone-1 sector 4 sweep started',c:'var(--text2)'},{time:'06:45',msg:'Survivor candidate thermal detected',c:'var(--red)'},{time:'06:40',msg:'Consensus — 4 RED zones active',c:'var(--red)'},{time:'06:35',msg:'NOAA wind data refreshed',c:'var(--text2)'},{time:'06:30',msg:'Mission started · wildfire scenario',c:'var(--text2)'}].map((e,i)=>(
                <div key={i} style={{display:'flex',gap:5,alignItems:'flex-start'}}>
                  <span style={{fontSize:6,color:'var(--text3)',...mono,flexShrink:0,marginTop:1}}>{e.time}</span>
                  <span style={{fontSize:7,color:e.c,...mono,lineHeight:1.4}}>{e.msg}</span>
                </div>
              ))}
            </div>
          </div>
          <div style={{...cardH,flexShrink:0,height:180}}>
            {hdr('HEADING')}
            <div style={{flex:1}}><CompassWidget heading={heading}/></div>
          </div>
        </div>

        {/* BOTTOM ROW */}

        {/* COL 2 bottom — 3 stat boxes */}
        <div style={{gridColumn:'2',gridRow:'2',display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6}}>
          {/* FLEET */}
          <div style={{...cardH}}>
            {hdr('FLEET')}
            <div style={{padding:'6px 8px',display:'flex',flexDirection:'column',gap:5,flex:1,justifyContent:'center'}}>
              {[{icon:'🛸',name:'D-1',status:'ACTIVE',bat:battery,c:'var(--green)'},{icon:'🚗',name:'R-1',status:'STBY',bat:45,c:'var(--amber)'},{icon:'🤿',name:'S-1',status:'OFF',bat:0,c:'var(--text3)'}].map((v,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:4}}>
                  <span style={{fontSize:11}}>{v.icon}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:7,fontWeight:700,color:'var(--text)',...mono}}>{v.name}</div>
                    <div style={{fontSize:6,color:v.c,...mono}}>{v.status}</div>
                  </div>
                  <div style={{fontSize:8,fontWeight:700,color:v.c,...mono}}>{v.bat>0?`${v.bat}%`:'--'}</div>
                </div>
              ))}
            </div>
          </div>

          {/* PERSONNEL */}
          <div style={{...cardH}}>
            {hdr('PERSONNEL')}
            <div style={{padding:'6px 8px',display:'flex',flexDirection:'column',gap:3,flex:1,justifyContent:'center'}}>
              <div>
                <div style={{fontSize:26,fontWeight:800,color:'var(--red)',...mono,lineHeight:1}}>14</div>
                <div style={{fontSize:5.5,color:'var(--red)',...mono,letterSpacing:'0.1em',opacity:0.8}}>UNACCOUNTED</div>
              </div>
              {[{v:3,l:'LOCATED',c:'var(--amber)'},{v:2,l:'RECOVERED',c:'var(--green)'},{v:0,l:'DECEASED',c:'var(--text3)'}].map((m,i)=>(
                <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontSize:5.5,color:'var(--text3)',...mono,letterSpacing:'0.06em'}}>{m.l}</span>
                  <span style={{fontSize:10,fontWeight:700,color:m.c,...mono}}>{m.v}</span>
                </div>
              ))}
            </div>
          </div>

          {/* RISK */}
          <div style={{...cardH}}>
            {hdr('RISK')}
            <div style={{padding:'6px 8px',display:'flex',flexDirection:'column',gap:4,flex:1,justifyContent:'center'}}>
              <div>
                <div style={{fontSize:26,fontWeight:800,color:'var(--amber)',...mono,lineHeight:1}}>62%</div>
                <div style={{fontSize:5.5,color:'var(--amber)',...mono,letterSpacing:'0.08em',opacity:0.8}}>CASCADE</div>
              </div>
              <div style={{height:2,background:'rgba(255,255,255,0.06)',borderRadius:1,overflow:'hidden'}}>
                <div style={{width:'62%',height:'100%',background:'var(--amber)',borderRadius:1}}/>
              </div>
              {[{v:'47%',l:'COVERAGE'},{v:'16',l:'MODELS'},{v:'4',l:'RED ZNS'}].map((m,i)=>(
                <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontSize:5.5,color:'var(--text3)',...mono,letterSpacing:'0.06em'}}>{m.l}</span>
                  <span style={{fontSize:9,fontWeight:700,color:'var(--text)',...mono}}>{m.v}</span>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* COL 3 bottom — METRICS same width as camera */}
        <div style={{gridColumn:'3',gridRow:'2',...cardH}}>
          {hdr('MISSION METRICS',fmtTime(flightSec)+' ELAPSED')}
          <div style={{flex:1,padding:'6px 14px',display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:'4px 10px',alignContent:'center'}}>
            <div style={{gridColumn:'1/2'}}>
              <div style={{fontSize:38,fontWeight:800,color:'var(--red)',...mono,lineHeight:1}}>14</div>
              <div style={{fontSize:5.5,color:'var(--red)',...mono,letterSpacing:'0.1em',opacity:0.8,marginTop:2}}>UNACCOUNTED</div>
            </div>
            {[{v:3,l:'LOCATED',c:'var(--amber)'},{v:2,l:'RECOVERED',c:'var(--green)'},{v:0,l:'DECEASED',c:'var(--text3)'},{v:7,l:'STRUCT CRIT',c:'var(--red)'},{v:23,l:'ASSESSED',c:'var(--text)'},{v:4,l:'HAZARD ZNS',c:'var(--amber)'},{v:'47%',l:'COVERAGE',c:'var(--gold)'},{v:16,l:'MODELS',c:'var(--green)'},{v:'62%',l:'CASCADE',c:'var(--amber)'}].map((m,i)=>(
              <div key={i}>
                <div style={{fontSize:20,fontWeight:800,color:m.c,...mono,lineHeight:1}}>{m.v}</div>
                <div style={{fontSize:5,color:'var(--text3)',...mono,letterSpacing:'0.07em',marginTop:2}}>{m.l}</div>
              </div>
            ))}
          </div>
        </div>

        {/* COL 4 bottom — PUBLIC INTEL spans row 2 */}
        <div style={{gridColumn:'4',gridRow:'2',...cardH}}>
          {hdr('PUBLIC INTEL','TIER 1')}
          <div style={{flex:1,overflow:'auto',padding:'5px 8px',display:'flex',flexDirection:'column',gap:4}}>
            {intelItems.map((item,i)=>(
              <div key={i} style={{padding:'4px 7px',background:'var(--card2)',borderRadius:5,border:`1px solid ${lvlColor(item.lvl)}18`}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
                  <span style={{fontSize:7,fontWeight:700,color:lvlColor(item.lvl),...mono,letterSpacing:'0.08em'}}>{item.src}</span>
                  <span style={{fontSize:6,color:'var(--text3)',...mono}}>{item.time}</span>
                </div>
                <div style={{fontSize:7,color:'var(--text2)',...mono,lineHeight:1.4}}>{item.msg}</div>
              </div>
            ))}
          </div>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
